version: '3.9'

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fraudshield_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fraudshield123
      POSTGRES_DB: fraudshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./fraud-backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./fraud-backend
      dockerfile: Dockerfile
    container_name: fraudshield_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:fraudshield123@db:5432/fraudshield
      SECRET_KEY: change-this-in-production-min-32-characters-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:4173
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (dev) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./fraud-shield
      dockerfile: Dockerfile
    container_name: fraudshield_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
